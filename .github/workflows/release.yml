name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-release-assets:
    runs-on: macos-latest
    permissions:
      contents: write
    env:
      KATALK_AX_VERSION: ${{ github.ref_name }}
      KATALK_AX_BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build CLI and MCP
        run: swift build -c release --product katalk-ax && swift build -c release --product kabot && swift build -c release --product katalk-ax-mcp

      - name: Build menu bar app bundle
        run: chmod +x scripts/build-menu-bar-app.sh && scripts/build-menu-bar-app.sh release

      - name: Create DMG
        run: chmod +x scripts/create-dmg.sh && scripts/create-dmg.sh dist/katalk-ax.app dist/katalk-ax.dmg

      - name: Archive CLI binaries
        run: |
          mkdir -p dist/cli
          cp .build/arm64-apple-macosx/release/kabot dist/cli/
          cp .build/arm64-apple-macosx/release/katalk-ax dist/cli/
          cp .build/arm64-apple-macosx/release/katalk-ax-mcp dist/cli/
          tar -czf dist/katalk-ax-cli.tar.gz -C dist/cli .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/katalk-ax.dmg
            dist/katalk-ax-cli.tar.gz
